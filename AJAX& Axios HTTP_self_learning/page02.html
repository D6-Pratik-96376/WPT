<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
     <div class="container">


        <h2 >Using then..catch</h2>
        <button class="btn btn-danger m-3" id="btngetdata" onclick="getDatabooks()">GetBookData</button>

        <table class="table">
                <thead>
                    <tr>
                        <th>Book_Id</th>
                        <th>Name</th>
                        <th>Price</th>
                    </tr>
                </thead>
                <tbody id="tbody">

                </tbody>
        </table>    
    </div>

    <script>

        function getDatabooks(){

        
        const tbody =document.getElementById('tbody')
         fetch('http://127.0.0.1:5500/data.json')
         .then((response) =>{
            response.json()
            .then((data) => {
                for(e of data){
                    const row = `<tr>    
                                <td>${e.id}</td>
                                <td>${e.book_name}</td>
                                <td>${e.Price}</td>
                            </tr>`
                    tbody.innerHTML +=row
                }
            })
         }).catch((ex) =>{
            console.log(ex)
         })
        }
    </script>

</body>
</html>
